<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHAMS Private School — Loading</title>
  <meta name="description" content="SHAMS Private School — Excellence in Education">
  <link rel="stylesheet" href="css/loading.css">
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <!-- Logo -->
    <div class="logo-container">
      <div class="logo-ring-outer"></div>
      <div class="logo-ring"></div>
      <div class="logo-inner">S</div>
    </div>

    <!-- School name -->
    <div class="loading-text-block">
      <p class="school-name">SHAMS Private School</p>
      <p class="school-tagline">Excellence · Innovation · Future</p>
      <p class="loading-label">Loading resources…</p>
    </div>

    <!-- Progress -->
    <div class="progress-container">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="progress-pct" id="progressPct">0%</p>
    </div>

    <!-- Bouncing dots -->
    <div class="dots-row">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script src="js/loading.js"></script>
</body>
</html>
